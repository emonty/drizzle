---
# TODO(ci-activation): before flipping CI on, add a
# drizzle-build-image-arm64 entry to vouched and gate for build-only
# readiness on arm64. amd64 is gating today; arm64 becomes fully
# gating in Phase 10. See the spec's CI section.
- project:
    check:
      jobs:
        - drizzle-lint
    vouched:
      jobs:
        - drizzle-build-image
        - drizzle-unit-tests:
            dependencies:
              - drizzle-build-image
        - drizzle-dtr-tests:
            dependencies:
              - drizzle-build-image
        - drizzle-distcheck:
            dependencies:
              - drizzle-build-image
        - drizzle-perf
    gate:
      jobs:
        - drizzle-build-image
        - drizzle-unit-tests:
            dependencies:
              - drizzle-build-image
        - drizzle-dtr-tests:
            dependencies:
              - drizzle-build-image
        - drizzle-distcheck:
            dependencies:
              - drizzle-build-image
        - drizzle-perf
    promote:
      jobs:
        - drizzle-promote-image
